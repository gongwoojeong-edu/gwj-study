  :root { --brand: #6B5B95; --brand-dark: #4A3D6B; --brand-light: #E8E4F3; --bg: #F7F5F0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif; background: var(--bg); color: #333; line-height: 1.6; padding: 24px 16px; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; }
  .header { background: linear-gradient(135deg, var(--brand), var(--brand-dark)); color: #fff; padding: 32px 24px; border-radius: 16px; text-align: center; margin-bottom: 20px; }
  .brand { font-size: 13px; opacity: 0.9; letter-spacing: 0.1em; margin-bottom: 8px; }
  h1 { font-size: 26px; margin-bottom: 8px; word-break: keep-all; }
  .subtitle { font-size: 14px; opacity: 0.9; }
  .intro { background: #fff; border-left: 4px solid var(--brand); padding: 14px 18px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; color: #555; box-shadow: 0 1px 4px rgba(0,0,0,0.04); }
  .book { background: #fff; border-radius: 12px; padding: 20px 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .book-title { color: var(--brand-dark); font-size: 19px; padding-bottom: 10px; border-bottom: 2px solid var(--brand-light); margin-bottom: 16px; }
  .chapter { margin-bottom: 20px; }
  .chapter:last-child { margin-bottom: 0; }
  .chapter-title { color: #555; font-size: 15px; margin-bottom: 10px; padding-left: 8px; border-left: 3px solid var(--brand); }
  .items { display: flex; flex-direction: column; gap: 8px; }
  .item { background: #faf9fc; border: 1px solid #e8e4f3; border-radius: 8px; padding: 12px 14px; transition: all 0.2s; }
  .item:hover { border-color: var(--brand); background: var(--brand-light); }
  .item-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .item-code { background: var(--brand); color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: monospace; }
  .item-title { color: #333; font-size: 14px; }
  .item-links { display: flex; gap: 8px; flex-wrap: wrap; }
  .item-links a { font-size: 12px; color: var(--brand-dark); text-decoration: none; padding: 4px 10px; background: #fff; border: 1px solid var(--brand); border-radius: 4px; }
  .item-links a:hover { background: var(--brand); color: #fff; }
  .footer { text-align: center; padding: 20px; font-size: 12px; color: #999; }
  @media (max-width: 520px) { h1 { font-size: 22px; } .book { padding: 16px; } }
