<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정치적 가스라이팅의 위험 - 학습 자료</title>
<style>
  :root {
    --brand: #6B5B95;
    --brand-dark: #4A3D6B;
    --brand-light: #E8E4F3;
    --bg: #F7F5F0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Pretendard', 'Malgun Gothic', -apple-system, sans-serif;
    background: var(--bg);
    color: #333;
    line-height: 1.6;
    min-height: 100vh;
    padding: 24px 16px;
  }
  .container { max-width: 720px; margin: 0 auto; }
  .header {
    background: linear-gradient(135deg, var(--brand), var(--brand-dark));
    color: #fff;
    padding: 32px 24px;
    border-radius: 16px 16px 0 0;
    text-align: center;
  }
  .brand { font-size: 13px; opacity: 0.9; letter-spacing: 0.1em; margin-bottom: 8px; }
  h1 { font-size: 24px; margin-bottom: 12px; word-break: keep-all; }
  .meta { font-size: 13px; opacity: 0.85; }
  .content {
    background: #fff;
    padding: 24px;
    border-radius: 0 0 16px 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .info-box {
    background: var(--brand-light);
    border-left: 4px solid var(--brand);
    padding: 14px 18px;
    border-radius: 8px;
    margin-bottom: 20px;
    font-size: 14px;
  }
  .cards { display: flex; flex-direction: column; gap: 12px; }
  .card {
    display: block;
    padding: 20px;
    border: 2px solid #e8e4f3;
    border-radius: 12px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    background: #fff;
  }
  .card:hover {
    border-color: var(--brand);
    background: var(--brand-light);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(107, 91, 149, 0.15);
  }
  .card-icon { font-size: 32px; margin-bottom: 8px; }
  .card-title { font-size: 17px; font-weight: 700; color: var(--brand-dark); margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: #666; }
  .footer {
    text-align: center;
    margin-top: 24px;
    padding: 16px;
    font-size: 12px;
    color: #999;
  }
  @media (max-width: 480px) {
    h1 { font-size: 20px; }
    .header { padding: 24px 16px; }
    .content { padding: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">공우정바른학원 · GWJ EDU</div>
    <h1>정치적 가스라이팅의 위험</h1>
    <div class="meta">가스라이팅은 개인 관계뿐 아니라 정치 영역에서도 발생하며, 정치인들이 거짓 서사, 사실 부정, 상대 불신 조장 등의 기법으로 여론을 조작한다. 이는 대중의 불신, 현실 인식 왜곡, 합리적 판단 불능을 초래하여 정치의 정상적 기능을 훼손한다.</div>
  </div>
  <div class="content">
    <div class="info-box">
      📚 <strong>1회</strong>
       · 1회 41-42번
       · <code>42</code>
    </div>

    <div class="cards">
      <a href="./analysis.html" class="card">
        <div class="card-icon">📄</div>
        <div class="card-title">분석교안 (4페이지)</div>
        <div class="card-desc">문장별 상세 분석, 어휘, 변형 예상 포인트</div>
      </a>
      <a href="./structure.html" class="card">
        <div class="card-icon">🗂</div>
        <div class="card-title">구조도 (인터랙티브)</div>
        <div class="card-desc">6단계 논리 구조, 문장 간 흐름 시각화</div>
      </a>
    </div>
  </div>
  <div class="footer">
    Last updated: 2026. 6. 20.
  </div>
</div>
</body>
</html>
