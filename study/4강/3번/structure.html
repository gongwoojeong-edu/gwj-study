<style>*, ::before, ::after { box-sizing: border-box; margin: 0px; padding: 0px; }

.teacher-info { font-size: 11px; color: var(--text-muted); padding: 4px 10px; background: rgb(248, 247, 243); border-radius: 12px; border: 1px solid var(--border); }

.action-btn { padding: 8px 14px; border: 1px solid var(--border); background: rgb(255, 255, 255); color: var(--text); font-family: inherit; font-size: 12px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: 0.15s; white-space: nowrap; }
.action-btn:hover { border-color: var(--brand); color: var(--brand-dark); }

.input-hero h1 { font-size: 22px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.3px; }
.input-hero p { font-size: 13px; opacity: 0.9; line-height: 1.7; }
.input-hero .small { opacity: 0.8; font-size: 12px; margin-top: 8px; }
.input-card { background: rgb(255, 255, 255); border: 1px solid var(--border); border-radius: 14px; padding: 24px; margin-bottom: 16px; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.input-field { display: flex; flex-direction: column; gap: 6px; }
.input-field label { font-size: 12px; font-weight: 700; color: var(--brand-dark); letter-spacing: 0.03em; }
.input-field input, .input-field textarea { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13px; color: var(--text); transition: border-color 0.15s; background: rgb(250, 250, 247); }
.input-field input:focus, .input-field textarea:focus { outline: none; border-color: var(--brand); background: rgb(255, 255, 255); box-shadow: rgba(107, 91, 149, 0.12) 0px 0px 0px 3px; }
.passage-area { width: 100%; min-height: 180px; resize: vertical; padding: 14px 16px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 13.5px; line-height: 1.7; color: var(--text); background: rgb(250, 250, 247); }
.passage-area:focus { outline: none; border-color: var(--brand); background: rgb(255, 255, 255); box-shadow: rgba(107, 91, 149, 0.12) 0px 0px 0px 3px; }
.action-row { display: flex; gap: 10px; align-items: center; margin-top: 16px; }
.generate-btn { flex: 1 1 0%; padding: 14px; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; border-radius: 10px; background: var(--brand); color: rgb(255, 255, 255); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.15s; letter-spacing: 0.02em; }
.generate-btn:hover { background: var(--brand-dark); transform: translateY(-1px); box-shadow: rgba(107, 91, 149, 0.3) 0px 4px 12px; }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
.status-box { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 12.5px; line-height: 1.6; display: none; }
.status-box.visible { display: block; }
.status-box.loading { background: rgb(254, 249, 240); border: 1px solid rgb(232, 200, 122); color: rgb(122, 69, 0); }
.status-box.error { background: rgb(254, 242, 242); border: 1px solid rgb(244, 199, 199); color: rgb(154, 32, 16); }
.status-box.success { background: rgb(225, 245, 238); border: 1px solid rgb(134, 212, 188); color: rgb(8, 80, 65); }
.spinner { display: inline-block; width: 12px; height: 12px; border-width: 2px; border-style: solid; border-color: transparent rgb(200, 144, 10) rgb(200, 144, 10); border-image: initial; border-radius: 50%; animation: 0.8s linear 0s infinite normal none running spin; margin-right: 6px; vertical-align: middle; }
@keyframes spin { 
  100% { transform: rotate(360deg); }
}
.tips-card { background: rgb(250, 250, 247); border: 1px dashed rgb(204, 204, 204); border-radius: 10px; padding: 16px 20px; font-size: 12px; color: var(--text-muted); line-height: 1.75; }
.tips-card strong { color: var(--brand-dark); }
.library-view { max-width: 1080px; margin: 24px auto; padding: 0px 20px; }
.library-toolbar { background: rgb(255, 255, 255); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; margin-bottom: 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.library-toolbar input, .library-toolbar select { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; font-size: 12.5px; background: rgb(250, 250, 247); }
.library-toolbar input:focus, .library-toolbar select:focus { outline: none; border-color: var(--brand); background: rgb(255, 255, 255); }
.search-input { flex: 1 1 0%; min-width: 180px; }
.library-toolbar .count-display { margin-left: auto; font-size: 12px; color: var(--text-muted); }
.library-toolbar .count-display strong { color: var(--brand-dark); font-weight: 700; }
.library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.library-card { background: rgb(255, 255, 255); border: 1px solid var(--border); border-radius: 12px; padding: 16px; transition: 0.15s; position: relative; display: flex; flex-direction: column; gap: 10px; }
.library-card:hover { border-color: var(--brand); box-shadow: rgba(107, 91, 149, 0.15) 0px 4px 14px; transform: translateY(-1px); }
.library-card.has-selection { border-color: rgb(76, 175, 80); background: rgb(241, 248, 233); }
.library-card .fav-btn { position: absolute; top: 12px; right: 12px; background: none; border-width: medium; border-style: none; border-color: currentcolor; border-image: initial; cursor: pointer; font-size: 16px; color: rgb(221, 221, 221); transition: color 0.15s; }
.library-card .fav-btn.active { color: var(--accent-amber); }
.library-card .fav-btn:hover { color: var(--accent-amber); }
.card-select-check { position: absolute; top: 12px; left: 12px; cursor: pointer; user-select: none; z-index: 2; }
.card-select-check input { position: absolute; opacity: 0; pointer-events: none; width: 22px; height: 22px; }
.card-select-check span { display: inline-block; width: 22px; height: 22px; border: 2px solid rgb(204, 204, 204); border-radius: 6px; background: rgb(255, 255, 255); position: relative; transition: 0.15s; }
.card-select-check:hover span { border-color: var(--brand); }
.card-select-check input:checked + span { background: rgb(76, 175, 80); border-color: rgb(76, 175, 80); }
.card-select-check input:checked + span::after { content: "✓"; color: rgb(255, 255, 255); font-weight: bold; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; line-height: 1; }
.library-card:has(.card-select-input:checked) { border-color: rgb(76, 175, 80); background: rgb(241, 248, 233); }
.card-meta { display: flex; gap: 6px; flex-wrap: wrap; font-size: 10.5px; padding-left: 32px; }
.card-meta .badge { padding: 2px 8px; background: var(--brand-light); color: var(--brand-dark); border-radius: 10px; font-weight: 700; }
.card-meta .badge.lesson { background: rgb(243, 241, 233); color: rgb(122, 69, 0); }
.card-meta .badge.item-code { background: var(--brand); color: rgb(255, 255, 255); }
.card-meta .badge.author { background: rgb(225, 245, 238); color: var(--accent-teal); }
.card-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.5; padding-right: 28px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.card-preview { font-size: 11.5px; color: var(--text-muted); line-height: 1.6; font-style: italic; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; padding: 6px 10px; background: rgb(250, 250, 247); border-left: 2px solid var(--brand-light); border-radius: 0px 4px 4px 0px; }
.card-footer { display: flex; gap: 6px; margin-top: 4px; padding-top: 10px; border-top: 1px solid rgb(240, 237, 230); }
.card-btn { flex: 1 1 0%; padding: 6px 8px; border: 1px solid var(--border); background: rgb(255, 255, 255); color: var(--text-muted); font-family: inherit; font-size: 11px; font-weight: 600; border-radius: 6px; cursor: pointer; transition: 0.12s; }
.card-btn:hover { border-color: var(--brand); color: var(--brand-dark); background: var(--brand-bg); }
.card-btn.danger:hover { border-color: var(--accent-red); color: var(--accent-red); background: rgb(254, 245, 245); }
.card-date { font-size: 10px; color: rgb(153, 153, 153); margin-top: 2px; }
.empty-library { max-width: 440px; margin: 80px auto; text-align: center; padding: 40px 20px; color: var(--text-muted); }
.empty-library .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
